name: Publish SMF Parking to Blog

on:
  push:
    branches:
      - main
  workflow_run:
    workflows:
      - Scrape Parking Data
    types:
      - completed
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: publish-smf-parking-to-blog
  cancel-in-progress: true

jobs:
  publish:
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Check out SMF Parking repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.10

      - name: Install dependencies
        run: uv sync --locked

      - name: Build static report
        run: uv run python -c "import query; query.write_static_report()"

      - name: Check out blog repository
        uses: actions/checkout@v4
        with:
          repository: therealdavidbour/blog
          ref: main
          token: ${{ secrets.GH_DEPLOY_SECRET }}
          path: blog

      - name: Copy static app into Hugo site
        run: |
          rm -rf blog/static/projects/smf-parking
          mkdir -p blog/static/projects/smf-parking
          cp index.html blog/static/projects/smf-parking/index.html
          cp -R assets blog/static/projects/smf-parking/assets

      - name: Commit SMF Parking update
        working-directory: blog
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add static/projects/smf-parking
          if git diff --cached --quiet; then
            echo "No SMF Parking changes to commit"
          else
            git commit -m "Update SMF Parking static app"
            git push
          fi
