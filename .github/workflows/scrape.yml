name: Scrape Parking Data

on:
  schedule:
    - cron: '*/10 * * * *'  # Every 10 minutes
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: scrape-parking-data
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.10

      - name: Install dependencies
        run: uv sync --locked

      - name: Scrape parking data
        run: uv run python query.py

      - name: Commit scraped data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/latest.json data/occupancy
          if git diff --cached --quiet; then
            echo "No data changes to commit."
            exit 0
          fi
          committed_at="$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          git commit -m "Update parking data ${committed_at}"
          git push
